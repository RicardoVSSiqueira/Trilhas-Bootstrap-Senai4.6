  <div class="container mt-4">
    <div class="row">
      <div class="col-md-4">
        <div class="card card-custom">
          <div class="card-body1">
            <h5 class="card-title"><i class="fas fa-chart-line"></i> Reservas Totais</h5>
            <p class="card-text">170</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-custom">
          <div class="card-body2">
            <h5 class="card-title"><i class="fas fa-users"></i> Reseras Hoje</h5>
            <p class="card-text">12</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-custom">
          <div class="card-body1">
            <h5 class="card-title"><i class="fas fa-cogs"></i> Pessoas Hoje</h5>
            <p class="card-text">40</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <div class="card card-custom">
          <div class="card-body">
            <div class="row mb-3">
              <div class="col-md-6">
                <h5 class="card-title"><i class="fas fa-table"></i> Tabela de Dados</h5>
              </div>
              <div class="col-md-6 text-right">
                <input type="text" class="form-control" placeholder="Pesquisar por Nome...">
              </div>
            </div>
            <div class="table-wrapper">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Pessoas</th>
                    <th>Horário</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Marcos</td>
                    <td>3</td>
                    <td>19:00</td>
                    <td class="confirmado">Confirmado</td>
                    <td>
                      <button class="btn btn-primary btn-sm"><i class="fas fa-edit"></i> Editar</button>
                      <button class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Excluir</button>
                    </td>
                  </tr>
                  <tr>
                    <td>Irineu</td>
                    <td>2</td>
                    <td>20:00</td>
                    <td class="pendente">Pendente</td>
                    <td>
                      <button class="btn btn-primary btn-sm"><i class="fas fa-edit"></i> Editar</button>
                      <button class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Excluir</button>
                    </td>
                  </tr>
                  <tr>
                    <td>Karen</td>
                    <td>4</td>
                    <td>20:30</td>
                    <td class="confirmado">Confirmado</td>
                    <td>
                      <button class="btn btn-primary btn-sm"><i class="fas fa-edit"></i> Editar</button>
                      <button class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Excluir</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
